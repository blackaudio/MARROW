<style>

const bungakuEvents = [

image:"IMG_6525.jpeg",

},

text:"👘 お飛びなさいませ～"

}

document.addEventListener(
"DOMContentLoaded",
function(){

  document.getElementById("marrow").innerHTML =
  stages[stage];

}
);

function grow(){

  if(stage < stages.length - 1){

    stage++;

    localStorage.setItem(
      "marrowStage",
      stage
    );

  }

  document.getElementById("marrow").innerHTML =
  stages[stage];

  document.getElementById("bungakuImage").style.display =
  "none";

  document.getElementById("writeButton").style.backgroundColor =
  "#90EE90";

  document.getElementById("writeButton").innerHTML =
  "書いたよ 🌱";

}

function bungaku(){

  let randomEvent =
  bungakuEvents[
    Math.floor(
      Math.random() *
      bungakuEvents.length
    )
  ];

  document.getElementById("marrow").innerHTML =
  randomEvent.text;

  document.getElementById("bungakuImage").src =
  randomEvent.image;

  document.getElementById("bungakuImage").style.display =
  "block";

}

</script>
