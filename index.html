<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="https://raw.githubusercontent.com/blackaudio/MARROW/main/IMG_6624.jpeg">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/blackaudio/MARROW/main/IMG_6624.jpeg">

<style>
body{
  background:#fff;
  text-align:center;
  font-family:sans-serif;
  padding-top:80px;
}

#marrow{
  font-size:80px;
  line-height:1.2;
  margin:20px auto;
}

#bungakuImage,
#marouImage{
  display:none;
  width:250px;
  margin:20px auto;
  border-radius:20px;
}

button{
  font-size:28px;
  padding:16px 28px;
  border-radius:20px;
  margin:8px;
}
</style>
</head>

<body>

<div id="marrow">🌱</div>

<img id="bungakuImage" src="">
<img id="marouImage" src="">

<br>

<button id="writeButton" onclick="grow()">今日は書いた</button>
<button id="chantButton" onclick="marouSmile()">読経／写経したよ</button>
<button id="noWriteButton" onclick="bungaku()">今日は書かなかった</button>

<script>
const stages = [
"🥔","🌱","🌿","🍀","🪴","🌺","🌸😆",
"☢️","☢️✨","☢️✨☢️","☢️✨☢️✨",
"🐥","🐥🥄","🐥🥄🍯","🐥🐤","🐥🐤💕","🐥📚","🐥📚✨",
"🌳","🌳🍃","🌳🍃🐗","🌳🍃🐺","🌳🍃🦉","🌳🍃🦌",
"🪴💪","🪴💪😤","🪴💪😤📚",
"🤪","🤪📚","🤪📚💥","🤪📚🔥","🤪📚🔥🌪️","🤪📚🔥🌪️🐥",
"🧊","🧊🐥","🧊📚",
"🏞️","⛰️","🏔️","🌋",
"🚀","🚀🌙","🚀🪐","🚀🌌",
"🌏","🌍","🌎",
"👁️","👁️📚","👁️📚✨",
"📚","📚📚","📚📚📚",
"👑","👑📚","👑📚✨",
"🛸"
];

let stage = Number(localStorage.getItem("marrowStage"));

if(isNaN(stage) || stage < 0 || stage >= stages.length){
  stage = 0;
  localStorage.setItem("marrowStage", stage);
}

const bungakuEvents = [
{ image:"IMG_6525.jpeg", text:"👘 飛ぶのです～" },
{ image:"IMG_6526.jpeg", text:"👘 お飛びなさいませ～" },
{ image:"IMG_6527.jpeg", text:"👘 ほら" },
{ image:"IMG_6528.jpeg", text:"👘 飛べっ！！" },
{ image:"IMG_6529.jpeg", text:"👘 本日も崖でございます～" },
{ image:"IMG_6525.jpeg", text:"👓 具体物にねじこめ" },
{ image:"IMG_6526.jpeg", text:"👓 呪う前に書け" },
{ image:"IMG_6527.jpeg", text:"👓 考察を本文へ移植しろ" },
{ image:"IMG_6528.jpeg", text:"👓 いやなできごとはお前の養分だ" },
{ image:"IMG_6529.jpeg", text:"👓 本文を書け" },
{ image:"IMG_6525.jpeg", text:"🔬 文章の肉声性そのものが具体物になっている" },
{ image:"IMG_6526.jpeg", text:"👓 殖えるだろう？" }
];

const marouImages = [
"IMG_6620.jpeg",
"IMG_6621.jpeg",
"IMG_6624.jpeg",
"IMG_6623.jpeg",
"IMG_6622.jpeg"
];

document.getElementById("marrow").innerHTML = stages[stage];

function grow(){
  if(stage < stages.length - 1){
    stage++;
    localStorage.setItem("marrowStage", stage);
  }

  document.getElementById("marrow").innerHTML = stages[stage];
  document.getElementById("bungakuImage").style.display = "none";
  document.getElementById("marouImage").style.display = "none";
  document.getElementById("writeButton").style.backgroundColor = "#90EE90";
  document.getElementById("writeButton").innerHTML = "書いたよ 🌱";
}

function bungaku(){
  let randomEvent = bungakuEvents[Math.floor(Math.random() * bungakuEvents.length)];

  document.getElementById("marrow").innerHTML = randomEvent.text;
  document.getElementById("bungakuImage").src = randomEvent.image;
  document.getElementById("bungakuImage").style.display = "block";
  document.getElementById("marouImage").style.display = "none";
}

function marouSmile(){
  let randomImage = marouImages[Math.floor(Math.random() * marouImages.length)];

  document.getElementById("marrow").innerHTML = "🪴 まろうちゃんが喜んでる";
  document.getElementById("marouImage").src = randomImage;
  document.getElementById("marouImage").style.display = "block";
  document.getElementById("bungakuImage").style.display = "none";
  document.getElementById("chantButton").style.backgroundColor = "#FFDAB9";
  document.getElementById("chantButton").innerHTML = "吸収されたよ 🪴✨";
}
</script>

</body>
</html>
